name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: TypeScript check
        working-directory: ${{ matrix.project }}
        run: npx tsc --noEmit

      - name: Vite build (desktop only)
        if: matrix.project == 'desktop'
        working-directory: ${{ matrix.project }}
        run: npm run build

  build-desktop:
    name: Build Desktop
    needs: lint-and-typecheck
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop
        run: npm run tauri build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://xyftktybsflvbwnppobl.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5ZnRrdHlic2ZsdmJ3bnBwb2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODk5NTIsImV4cCI6MjA5MTE2NTk1Mn0.dI-28qa9cjaEm7PeQ7t8Ag-qCqWxAjmrQUVnXs9p9cE' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: desktop/src-tauri/target/release/bundle/

  build-mobile-android:
    name: Build Mobile (Android)
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm ci
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xyftktybsflvbwnppobl.supabase.co' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5ZnRrdHlic2ZsdmJ3bnBwb2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODk5NTIsImV4cCI6MjA5MTE2NTk1Mn0.dI-28qa9cjaEm7PeQ7t8Ag-qCqWxAjmrQUVnXs9p9cE' }}

      - name: Prebuild Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xyftktybsflvbwnppobl.supabase.co' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5ZnRrdHlic2ZsdmJ3bnBwb2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODk5NTIsImV4cCI6MjA5MTE2NTk1Mn0.dI-28qa9cjaEm7PeQ7t8Ag-qCqWxAjmrQUVnXs9p9cE' }}

      - name: Build Android APK (arm64-v8a)
        working-directory: mobile/android
        run: ./gradlew :app:assembleRelease -PreactNativeArchitectures=arm64-v8a
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xyftktybsflvbwnppobl.supabase.co' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5ZnRrdHlic2ZsdmJ3bnBwb2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODk5NTIsImV4cCI6MjA5MTE2NTk1Mn0.dI-28qa9cjaEm7PeQ7t8Ag-qCqWxAjmrQUVnXs9p9cE' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: mobile/android/app/build/outputs/
